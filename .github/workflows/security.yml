# Security Scanning
#
# Runs on all PRs and weekly to catch vulnerabilities early.
# All 3rd-party actions pinned to exact commit SHAs.

name: Security

on:
  pull_request:
    branches: [main]
  schedule:
    # Weekly on Sunday at 3 AM UTC
    - cron: "0 3 * * 0"
  workflow_dispatch:

jobs:
  govulncheck:
    name: Go Vulnerability Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - name: Setup Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: "1.26.1"

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...

  gosec:
    name: Go Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - name: Setup Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: "1.26.1"

      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@v2.25.0

      - name: Run gosec
        run: gosec -severity medium -track-suppressions ./...
